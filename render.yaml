services:
  - type: web
    name: portfolio-health-check-backend
    runtime: docker
    plan: starter
    region: virginia
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-health-check-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: SEC_USER_AGENT
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: BEA_API_KEY
        sync: false
      - key: BLS_API_KEY
        sync: false
      - key: CENSUS_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: PORTFOLIO_APP_ENV
        value: production
      - key: PORTFOLIO_API_CORS_ORIGINS
        value: https://portfolio-health-check-frontend.onrender.com
  - type: web
    name: portfolio-health-check-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://portfolio-health-check-backend.onrender.com

databases:
  - name: portfolio-health-check-db
    plan: basic-1gb
    region: virginia
